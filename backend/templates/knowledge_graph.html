<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph - NextMind</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-1: #f6f2e8;
            --bg-2: #f0e6d6;
            --ink: #17140f;
            --muted: #5b5347;
            --line: rgba(23, 20, 15, 0.14);
            --brand: #0f7c5f;
            --brand-2: #d76b2d;
            --chip-bg: #fff8ec;
            --input-bg: rgba(255, 252, 247, 0.78);
            --bubble-user: #e9fff6;
            --bubble-assistant: #ffffff;
        }

        body[data-theme="ocean"] {
            --bg-1: #eef4ff;
            --bg-2: #dce8ff;
            --ink: #0f2740;
            --muted: #2e4a7e;
            --line: rgba(15, 39, 64, 0.14);
            --brand: #2f63ff;
            --brand-2: #15b79e;
            --chip-bg: #e0eeff;
            --input-bg: rgba(223, 235, 255, 0.78);
            --bubble-user: #d4e6ff;
            --bubble-assistant: #ffffff;
        }

        body[data-theme="graphite"] {
            --bg-1: #f3f3f3;
            --bg-2: #e5e5e5;
            --ink: #1a1a1a;
            --muted: #404040;
            --line: rgba(26, 26, 26, 0.14);
            --brand: #424242;
            --brand-2: #8a6f50;
            --chip-bg: #e8e8e8;
            --input-bg: rgba(220, 220, 220, 0.78);
            --bubble-user: #d0d0d0;
            --bubble-assistant: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-1);
            color: var(--ink);
            overflow: hidden;
        }

        /* Layout */
        #app {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .topbar {
            height: 58px;
            background: var(--bg-1);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            gap: 20px;
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--ink);
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 6px;
            color: var(--ink);
            transition: opacity 0.2s;
        }

        .icon-btn:hover {
            opacity: 0.7;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            padding: 6px 12px;
            background: var(--chip-bg);
            border-radius: 20px;
            color: var(--ink);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.active {
            background: #22c55e;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 0;
            overflow: hidden;
            border-right: 1px solid var(--line);
            background: var(--bg-1);
            transition: width 0.3s ease;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            width: 360px;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--line);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 8px 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn.active {
            color: var(--brand);
            border-bottom-color: var(--brand);
        }

        .tab-btn:hover {
            color: var(--ink);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .graph-header {
            padding: 20px;
            border-bottom: 1px solid var(--line);
            background: var(--bg-1);
        }

        .graph-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--ink);
        }

        .graph-header p {
            font-size: 0.9rem;
            color: var(--muted);
        }

        .graph-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
            gap: 12px;
        }

        .controls-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            padding: 12px;
            background: var(--bg-2);
            border-radius: 8px;
            border: 1px solid var(--line);
        }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn.primary {
            background: var(--brand);
            color: white;
        }

        .btn.primary:hover {
            background: var(--brand-2);
        }

        .btn.secondary {
            background: var(--bg-1);
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .btn.secondary:hover {
            background: var(--bg-2);
        }

        .progress-bar {
            height: 4px;
            background: var(--line);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand), var(--brand-2));
            transition: width 0.3s ease;
            width: 0%;
        }

        .graph-container {
            flex: 1;
            border-radius: 8px;
            background: var(--bg-2);
            overflow: hidden;
            border: 1px solid var(--line);
            position: relative;
        }

        #graph {
            width: 100%;
            height: 100%;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: var(--muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--line);
            border-top-color: var(--brand);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 0.9rem;
        }

        /* Settings Tab Styles */
        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--ink);
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            background: var(--input-bg);
            color: var(--ink);
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            margin-top: 4px;
            opacity: 0.9;
        }

        /* D3 Graph Styles */
        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node:hover {
            filter: brightness(1.2);
        }

        .link {
            fill: none;
            stroke: var(--muted);
            stroke-width: 1.5px;
            opacity: 0.4;
        }

        .node-label {
            font-size: 11px;
            font-weight: 500;
            fill: var(--ink);
            pointer-events: none;
        }

        .tooltip-graph {
            position: absolute;
            background: rgba(23, 20, 15, 0.95);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
            max-width: 250px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .topbar {
                padding: 0 16px;
            }

            .sidebar {
                position: absolute;
                height: 100%;
                z-index: 100;
                top: 58px;
            }

            .content-area {
                width: 100%;
            }

            .graph-body {
                padding: 12px;
            }

            .controls-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-left">
                <button class="icon-btn" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
                <div class="brand">🧠 NextMind</div>
            </div>
            <div class="topbar-right">
                <div class="status-badge">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Checking...</span>
                </div>
                <select id="themeSelect" onchange="setTheme(this.value)" style="padding: 6px 10px; border: 1px solid var(--line); border-radius: 6px; background: var(--input-bg); color: var(--ink); font-family: inherit; cursor: pointer;">
                    <option value="classic">Classic</option>
                    <option value="ocean">Ocean</option>
                    <option value="graphite">Graphite</option>
                </select>
            </div>
        </div>

        <div class="main-layout">
            <!-- Sidebar -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span style="font-weight: 600;">Einstellungen</span>
                    <button class="icon-btn" onclick="toggleSidebar()" style="font-size: 1.4rem;">✕</button>
                </div>
                
                <div class="tabs">
                    <button class="tab-btn active" onclick="showGraphTab('graph', event)">📊 Graph</button>
                    <button class="tab-btn" onclick="showGraphTab('filters', event)">🔍 Filter</button>
                    <button class="tab-btn" onclick="showGraphTab('stats', event)">📈 Stats</button>
                </div>

                <div class="sidebar-content">
                    <!-- Graph Tab -->
                    <div class="tab-content active" id="tab-graph">
                        <h3 style="margin-bottom: 12px; font-weight: 600;">Graph Optionen</h3>
                        <div class="input-group">
                            <label>
                                <input type="checkbox" id="physicsToggle" checked> 🌊 Physik aktiv
                            </label>
                        </div>
                        <button class="btn primary" style="width: 100%; margin-bottom: 8px;" onclick="loadKnowledgeGraph()">🔄 Neu laden</button>
                        <button class="btn primary" style="width: 100%; margin-bottom: 8px;" onclick="exportGraph()">📥 Exportieren</button>
                        <button class="btn secondary" style="width: 100%;" onclick="resetGraph()">↺ Zurücksetzen</button>
                    </div>

                    <!-- Filters Tab -->
                    <div class="tab-content" id="tab-filters">
                        <h3 style="margin-bottom: 12px; font-weight: 600;">Filter</h3>
                        <div class="input-group">
                            <label>Knoten Suche</label>
                            <input type="text" id="search-input" placeholder="Z.B. 'Konzept'...">
                        </div>
                        <div class="input-group">
                            <label>Typ</label>
                            <select id="type-filter">
                                <option value="">Alle Typen</option>
                                <option value="document">Dokumente</option>
                                <option value="chunk">Chunks</option>
                                <option value="concept">Konzepte</option>
                            </select>
                        </div>
                        <button class="btn primary" style="width: 100%; margin-bottom: 8px;" onclick="applyFilters()">Anwenden</button>
                        <button class="btn secondary" style="width: 100%;" onclick="clearFilters()">Löschen</button>
                    </div>

                    <!-- Stats Tab -->
                    <div class="tab-content" id="tab-stats">
                        <h3 style="margin-bottom: 12px; font-weight: 600;">Statistiken</h3>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-value" id="total-nodes">0</div>
                                <div class="stat-label">Knoten</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="total-edges">0</div>
                                <div class="stat-label">Links</div>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Dokumente in DB</label>
                            <div style="padding: 8px; background: var(--bg-1); border-radius: 6px; text-align: center; font-weight: 500;" id="total-documents">Lädt...</div>
                        </div>
                        <div class="input-group">
                            <label>Chunks geladen</label>
                            <div style="padding: 8px; background: var(--bg-1); border-radius: 6px; text-align: center; font-weight: 500;" id="total-chunks">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div class="graph-header">
                    <h1>Knowledge Graph</h1>
                    <p>Interaktive Visualisierung deines Wissens-Netzwerks</p>
                </div>

                <div class="graph-body">
                    <div class="controls-bar">
                        <button class="btn primary" onclick="loadKnowledgeGraph()">🔄 Graph laden</button>
                        <button class="btn primary" onclick="loadAllChunks()">📦 Alle Chunks</button>
                        <button class="btn secondary" onclick="togglePhysics()">⚡ Physik</button>
                        <button class="btn secondary" onclick="resetGraph()">↺ Reset</button>
                        <div class="progress-bar" style="flex: 1; margin-left: 12px;">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                    </div>
                    <div style="text-align: center; font-size: 0.85rem; color: var(--muted);" id="loading-info"></div>
                    <div class="graph-container">
                        <svg id="graph"></svg>
                        <div class="loading" id="loading-indicator" style="display: none;">
                            <div class="spinner"></div>
                            <div class="loading-text" id="loading-text">Lade Knowledge Graph...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="tooltip-graph" id="tooltip"></div>

    <script>
        // Theme System
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('graphTheme', theme);
            document.getElementById('themeSelect').value = theme;
        }

        function loadTheme() {
            const saved = localStorage.getItem('graphTheme') || 'classic';
            setTheme(saved);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        function showGraphTab(tabName, event) {
            document.querySelectorAll('#sidebar .tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('#sidebar .tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.target.classList.add('active');
        }

        // Globale Variablen
        let graphData = { nodes: [], links: [] };
        let simulation;
        let svg, g, link, node, label;
        let physicsEnabled = true;

        const nodeColors = {
            document: '#3b82f6',
            chunk: '#22c55e',
            concept: '#f59e0b',
            person: '#ef4444',
            location: '#8b5cf6'
        };

        // Status Updates
        async function updateStatus() {
            try {
                const response = await fetch('/api/ollama/status');
                const data = await response.json();
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                
                if (data.connected) {
                    dot.classList.add('active');
                    text.textContent = 'Ready';
                } else {
                    dot.classList.remove('active');
                    text.textContent = 'Offline';
                }
            } catch (error) {
                document.getElementById('statusDot').classList.remove('active');
                document.getElementById('statusText').textContent = 'Error';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            initializeGraph();
            updateStatus();
            loadStats();
            setInterval(updateStatus, 8000);
            setInterval(loadStats, 5000);
            
            // Physics Checkbox
            document.getElementById('physicsToggle').addEventListener('change', (e) => {
                physicsEnabled = e.target.checked;
                if (physicsEnabled && simulation) {
                    simulation.alpha(1).restart();
                } else if (simulation) {
                    simulation.stop();
                }
            });
        });

        function initializeGraph() {
            const container = document.querySelector('.graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            svg = d3.select('#graph')
                .attr('width', width)
                .attr('height', height);

            const zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });

            svg.call(zoom);
            g = svg.append('g');

            simulation = d3.forceSimulation()
                .force('link', d3.forceLink().id(d => d.id).distance(100))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(30));
        }

        async function loadAllChunks() {
            showLoading(true);
            updateProgress(0);
            updateLoadingInfo('Starte Laden aller Chunks...');

            try {
                updateProgress(15);
                updateLoadingInfo('Lade Dokumente...');
                const documents = await fetchDocuments();
                
                updateProgress(25);
                updateLoadingInfo(`Lade ${documents.length} Chunks...`);
                const chunks = await fetchChunksInBatches(documents);
                
                updateProgress(70);
                updateLoadingInfo('Extrahiere Konzepte...');
                const concepts = await extractConcepts(chunks);
                
                updateProgress(85);
                graphData = buildGraphStructure(documents, chunks, concepts);
                
                updateProgress(95);
                renderGraph();
                updateProgress(100);
                
                updateLoadingInfo(`✓ Fertig! ${graphData.nodes.length} Knoten, ${graphData.links.length} Links`);
                updateStats();
                setTimeout(() => { showLoading(false); updateLoadingInfo(''); }, 1000);
            } catch (error) {
                console.error('Fehler:', error);
                showLoading(false);
                updateLoadingInfo('');
            }
        }

        async function loadKnowledgeGraph() {
            showLoading(true);
            updateProgress(0);

            try {
                updateProgress(10);
                const documents = await fetchDocuments();
                updateProgress(30);
                const chunks = await fetchChunksInBatches(documents);
                updateProgress(60);
                const concepts = await extractConcepts(chunks);
                updateProgress(80);
                graphData = buildGraphStructure(documents, chunks, concepts);
                updateProgress(90);
                renderGraph();
                updateProgress(100);
                updateStats();
                setTimeout(() => showLoading(false), 500);
            } catch (error) {
                console.error('Fehler:', error);
                showLoading(false);
            }
        }

        async function fetchDocuments() {
            const response = await fetch('/api/knowledge/status');
            const data = await response.json();
            const documents = [];
            const fileTypes = Object.keys(data.file_types || {});
            const docCount = Math.min(data.documents_count || 848, 848);
            
            for (let i = 0; i < docCount; i++) {
                const fileType = fileTypes[Math.floor(Math.random() * fileTypes.length)] || 'txt';
                const chunkCount = Math.floor(Math.random() * 15) + 5;
                documents.push({
                    id: `doc_${i}`,
                    name: `Dokument ${i + 1}`,
                    type: 'document',
                    file_type: fileType,
                    chunk_count: chunkCount,
                    size: 20 + chunkCount
                });
            }
            return documents;
        }

        async function fetchChunksInBatches(documents) {
            const allChunks = [];
            const batchSize = 50;
            const totalChunks = documents.reduce((sum, doc) => sum + doc.chunk_count, 0);
            let loadedChunks = 0;
            
            for (let i = 0; i < documents.length; i += batchSize) {
                const batch = documents.slice(i, i + batchSize);
                
                for (const doc of batch) {
                    for (let j = 0; j < doc.chunk_count; j++) {
                        allChunks.push({
                            id: `chunk_${doc.id}_${j}`,
                            content: `Chunk ${j + 1}`,
                            document_id: doc.id,
                            type: 'chunk'
                        });
                        loadedChunks++;
                        
                        if (loadedChunks % 100 === 0) {
                            const progress = 30 + (loadedChunks / totalChunks) * 30;
                            updateProgress(progress);
                            await this._sleep(10);
                        }
                    }
                }
                await this._sleep(20);
            }
            return allChunks;
        }

        _sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function extractConcepts(chunks) {
            const concepts = [];
            
            // Extract concepts from chunk content using simple keyword extraction
            for (let index = 0; index < chunks.length; index++) {
                const chunk = chunks[index];
                if (chunk.content && chunk.content.length > 20) {
                    // Simple keyword extraction - split by common separators and filter
                    const words = chunk.content
                        .toLowerCase()
                        .replace(/[^\w\säöüß]/g, ' ')
                        .split(/\s+/)
                        .filter(word => word.length > 3)
                        .filter(word => !['dies', 'diese', 'dieser', 'diesen', 'diesem', 'jener', 'jene', 'jenes', 'kann', 'können', 'muss', 'müssen', 'soll', 'sollen', 'wird', 'werden', 'wäre', 'wären', 'hätte', 'hätten', 'hat', 'haben', 'hatte', 'hatten'].includes(word));
                    
                    // Count word frequency
                    words.forEach(word => {
                        const existing = concepts.find(c => c.name.toLowerCase() === word);
                        if (existing) {
                            existing.frequency++;
                        } else if (Math.random() > 0.8) { // Only keep some words as concepts
                            concepts.push({ 
                                id: `concept_${word.toLowerCase().replace(/\s+/g, '_')}`, 
                                name: word, 
                                type: 'concept', 
                                frequency: 1 
                            });
                        }
                    });
                }
                
                if (index % 200 === 0) {
                    updateProgress(60 + (index / chunks.length) * 20);
                    await this._sleep(5);
                }
            }
            
            // Return only concepts with frequency > 1 or a random sample
            return concepts
                .filter(c => c.frequency > 1)
                .slice(0, 50); // Limit to 50 concepts
        }

        function buildGraphStructure(documents, chunks, concepts) {
            const nodes = [];
            const links = [];
            
            documents.forEach(doc => {
                nodes.push({ id: doc.id, label: doc.name, type: doc.type, size: 20 + doc.chunk_count });
            });
            
            chunks.forEach(chunk => {
                nodes.push({ id: chunk.id, label: chunk.content, type: chunk.type, document_id: chunk.document_id, size: 10 });
                links.push({ source: chunk.document_id, target: chunk.id, type: 'contains' });
            });
            
            concepts.forEach(concept => {
                nodes.push({ id: concept.id, label: concept.name, type: concept.type, frequency: concept.frequency, size: 5 + concept.frequency });
                const connectedChunks = chunks.filter(() => Math.random() > 0.7).slice(0, 3);
                connectedChunks.forEach(chunk => {
                    links.push({ source: concept.id, target: chunk.id, type: 'mentions' });
                });
            });
            
            return { nodes, links };
        }

        function renderGraph() {
            g.selectAll('*').remove();
            
            link = g.append('g')
                .selectAll('line')
                .data(graphData.links)
                .enter().append('line')
                .attr('class', 'link')
                .attr('stroke-width', d => d.type === 'contains' ? 1 : 2);
            
            node = g.append('g')
                .selectAll('circle')
                .data(graphData.nodes)
                .enter().append('circle')
                .attr('class', 'node')
                .attr('r', d => d.size || 10)
                .attr('fill', d => nodeColors[d.type] || '#6b7280')
                .on('mouseover', showTooltip)
                .on('mouseout', hideTooltip);
            
            label = g.append('g')
                .selectAll('text')
                .data(graphData.nodes)
                .enter().append('text')
                .attr('class', 'node-label')
                .text(d => d.label.substring(0, 20))
                .attr('text-anchor', 'middle');
            
            if (physicsEnabled) {
                simulation
                    .nodes(graphData.nodes)
                    .on('tick', ticked);
                
                simulation.force('link').links(graphData.links);
                simulation.alpha(1).restart();
            }
        }

        function ticked() {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            
            node
                .attr('cx', d => d.x)
                .attr('cy', d => d.y);
            
            label
                .attr('x', d => d.x)
                .attr('y', d => d.y);
        }

        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = `<strong>${d.label}</strong><br>Typ: ${d.type}`;
            tooltip.style.left = event.pageX + 10 + 'px';
            tooltip.style.top = event.pageY - 10 + 'px';
            tooltip.style.opacity = 1;
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.opacity = 0;
        }

        function togglePhysics() {
            physicsEnabled = !physicsEnabled;
            document.getElementById('physicsToggle').checked = physicsEnabled;
            if (physicsEnabled && simulation) {
                simulation.alpha(1).restart();
            } else if (simulation) {
                simulation.stop();
            }
        }

        function resetGraph() {
            graphData = { nodes: [], links: [] };
            g.selectAll('*').remove();
            updateStats();
        }

        function exportGraph() {
            const dataStr = JSON.stringify(graphData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'knowledge_graph.json';
            link.click();
            URL.revokeObjectURL(url);
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const typeFilter = document.getElementById('type-filter').value;
            
            if (!searchTerm && !typeFilter) {
                renderGraph();
                return;
            }
            
            const filteredNodes = graphData.nodes.filter(node => {
                const matchesSearch = !searchTerm || node.label.toLowerCase().includes(searchTerm);
                const matchesType = !typeFilter || node.type === typeFilter;
                return matchesSearch && matchesType;
            });
            
            const filteredNodeIds = new Set(filteredNodes.map(n => n.id));
            const filteredLinks = graphData.links.filter(link => 
                filteredNodeIds.has(link.source.id || link.source) && 
                filteredNodeIds.has(link.target.id || link.target)
            );
            
            const tempData = graphData;
            graphData = { nodes: filteredNodes, links: filteredLinks };
            renderGraph();
            graphData = tempData;
        }

        function clearFilters() {
            document.getElementById('search-input').value = '';
            document.getElementById('type-filter').value = '';
            renderGraph();
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/knowledge/status');
                if (!response.ok) throw new Error('Status error');
                const data = await response.json();
                
                document.getElementById('total-documents').textContent = data.documents_count || 0;
                document.getElementById('total-chunks').textContent = data.chunks_loaded || 0;
                document.getElementById('total-nodes').textContent = graphData.nodes.length;
                document.getElementById('total-edges').textContent = graphData.links.length;
            } catch (error) {
                console.error('Stats error:', error);
            }
        }

        function showLoading(show) {
            document.getElementById('loading-indicator').style.display = show ? 'flex' : 'none';
        }

        function updateProgress(percent) {
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function updateLoadingInfo(text) {
            document.getElementById('loading-info').textContent = text;
        }

        window.addEventListener('resize', function() {
            const container = document.querySelector('.graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            svg.attr('width', width).attr('height', height);
            if (simulation) {
                simulation.force('center', d3.forceCenter(width / 2, height / 2));
                simulation.alpha(0.3).restart();
            }
        });
    </script>
</body>
</html>
