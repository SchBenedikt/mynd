<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph - Second Brain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #f8fafc;
            --accent: #3b82f6;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .main-layout {
            display: flex;
            gap: 24px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .content-area {
            flex: 1;
            min-width: 0;
        }

        .sidebar {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        @media (min-width: 1600px) {
            .sidebar {
                width: 420px;
            }
            
            .main-layout {
                gap: 32px;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 12px 40px var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 28px;
            margin-bottom: 24px;
        }

        .graph-container {
            height: 700px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background: #fafafa;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        
        @media (min-width: 1400px) {
            .graph-container {
                height: 750px;
            }
        }
        
        @media (min-width: 1600px) {
            .graph-container {
                height: 800px;
            }
        }

        #graph {
            width: 100%;
            height: 100%;
        }

        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node:hover {
            filter: brightness(1.2);
        }

        .link {
            fill: none;
            stroke: #cbd5e1;
            stroke-width: 1.5px;
            opacity: 0.6;
        }

        .node-label {
            font-size: 12px;
            font-weight: 500;
            fill: var(--primary);
            pointer-events: none;
        }

        .tooltip {
            position: absolute;
            background: var(--primary);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
            max-width: 300px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-secondary {
            background: var(--border);
            color: var(--primary);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: var(--primary);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-right: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin: 16px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .filter-section {
            background: #f8fafc;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            min-width: 200px;
        }

        .legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* Chat History Styles */
        .chat-history {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .chat-history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .chat-history-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-history-messages {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            margin-bottom: 16px;
        }

        .chat-message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.875rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-out;
        }

        .chat-message.user {
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: white;
            margin-left: 20px;
            border-bottom-right-radius: 4px;
        }

        .chat-message.ai {
            background: #f8fafc;
            color: var(--primary);
            border: 1px solid var(--border);
            margin-right: 20px;
            border-bottom-left-radius: 4px;
        }

        .chat-message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 4px;
        }

        .chat-input-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #f8fafc;
        }

        .chat-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .chat-send-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .chat-send-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clear-chat-btn {
            background: var(--border);
            color: var(--primary);
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-chat-btn:hover {
            background: var(--error);
            color: white;
        }

        .empty-chat {
            text-align: center;
            color: var(--text-light);
            padding: 40px 20px;
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="content-area">
            <div class="container">
                <!-- Header -->
                <div class="glass-card">
                    <h1 class="text-3xl font-bold text-gray-800 mb-2">🧠 Knowledge Graph</h1>
                    <p class="text-gray-600">Interaktive Visualisierung deines Wissens-Netzwerks</p>
                </div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="total-nodes">0</div>
                        <div class="stat-label">Knoten</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="total-edges">0</div>
                        <div class="stat-label">Verbindungen</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="total-documents">Lädt...</div>
                        <div class="stat-label">Dokumente</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="total-chunks">Lädt...</div>
                        <div class="stat-label">Chunks</div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="glass-card">
                    <div class="controls">
                        <button class="btn btn-primary" onclick="loadKnowledgeGraph()">
                            🔄 Graph laden
                        </button>
                        <button class="btn btn-primary" onclick="loadAllChunks()">
                            📦 Alle Chunks laden (ca. 8000+)
                        </button>
                        <button class="btn btn-secondary" onclick="resetGraph()">
                            🔄 Zurücksetzen
                        </button>
                        <button class="btn btn-secondary" onclick="exportGraph()">
                            📥 Exportieren
                        </button>
                        <button class="btn btn-secondary" onclick="togglePhysics()">
                            ⚡ Physik
                        </button>
                    </div>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                    </div>
                    
                    <div id="loading-info" style="margin: 10px 0; color: #666; font-size: 14px;"></div>
                    
                    <div id="loading-indicator" class="loading" style="display: none;">
                        <div class="spinner"></div>
                        <span id="loading-text">Lade Knowledge Graph...</span>
                    </div>
                </div>

                <!-- Filter -->
                <div class="glass-card filter-section">
                    <h3 class="text-lg font-semibold mb-3">Filter</h3>
                    <div class="filter-group">
                        <input type="text" class="search-input" id="search-input" placeholder="Suche Knoten...">
                        <select class="search-input" id="type-filter">
                            <option value="">Alle Typen</option>
                            <option value="document">Dokumente</option>
                            <option value="chunk">Chunks</option>
                            <option value="concept">Konzepte</option>
                        </select>
                        <button class="btn btn-primary" onclick="applyFilters()">Anwenden</button>
                        <button class="btn btn-secondary" onclick="clearFilters()">Löschen</button>
                    </div>
                </div>

                <!-- Legend -->
                <div class="glass-card">
                    <div class="legend">
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #3b82f6;"></div>
                            <span>Dokumente</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #22c55e;"></div>
                            <span>Chunks</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #f59e0b;"></div>
                            <span>Konzepte</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #ef4444;"></div>
                            <span>Personen</span>
                        </div>
                    </div>
                </div>

                <!-- Graph -->
                <div class="glass-card">
                    <div class="graph-container">
                        <svg id="graph"></svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Chat History -->
            <div class="chat-history">
                <div class="chat-history-header">
                    <div class="chat-history-title">
                        💬 Chat Verlauf
                    </div>
                    <button class="clear-chat-btn" onclick="clearChatHistory()">Löschen</button>
                </div>
                <div class="chat-history-messages" id="chatMessages">
                    <div class="empty-chat">
                        Noch keine Nachrichten. Beginne ein Gespräch!
                    </div>
                </div>
                <div class="chat-input-container">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Nachricht eingeben..." onkeypress="handleChatKeyPress(event)">
                    <button class="chat-send-btn" id="chatSendBtn" onclick="sendChatMessage()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <script>
        // Globale Variablen
        let graphData = { nodes: [], links: [] };
        let simulation;
        let svg, g, link, node, label;
        let physicsEnabled = true;
        let currentZoom = 1;

        // Farben für verschiedene Knotentypen
        const nodeColors = {
            document: '#3b82f6',
            chunk: '#22c55e',
            concept: '#f59e0b',
            person: '#ef4444',
            location: '#8b5cf6',
            date: '#06b6d4',
            organization: '#ec4899'
        };

        // Initialisierung
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded'); // Debug log
            initializeGraph();
            
            // Lade Stats sofort und dann periodisch
            loadStats();
            setInterval(loadStats, 5000); // Alle 5 Sekunden neu laden
        });

        function initializeGraph() {
            const container = document.querySelector('.graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            svg = d3.select('#graph')
                .attr('width', width)
                .attr('height', height);

            // Zoom-Verhalten
            const zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                    currentZoom = event.transform.k;
                });

            svg.call(zoom);

            g = svg.append('g');

            // Force Simulation
            simulation = d3.forceSimulation()
                .force('link', d3.forceLink().id(d => d.id).distance(100))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(30));
        }

        async function loadAllChunks() {
            showLoading(true);
            updateProgress(0);
            updateLoadingInfo('Starte Laden aller Chunks...');

            try {
                // Schritt 1: Lade Dokumente
                updateProgress(5);
                updateLoadingInfo('Lade Dokumente aus der Datenbank...');
                const documents = await fetchDocuments();
                updateLoadingInfo(`${documents.length} Dokumente geladen`);
                
                // Schritt 2: Lade ALLE Chunks in Batches
                updateProgress(15);
                updateLoadingInfo('Lade alle Chunks (dies kann einige Zeit dauern)...');
                const chunks = await fetchChunksInBatches(documents);
                updateLoadingInfo(`${chunks.length} Chunks geladen`);
                
                // Schritt 3: Extrahiere Konzepte
                updateProgress(70);
                updateLoadingInfo('Extrahiere Konzepte aus Chunks...');
                const concepts = await extractConcepts(chunks);
                updateLoadingInfo(`${concepts.length} Konzepte extrahiert`);
                
                // Schritt 4: Erstelle Graph-Struktur
                updateProgress(85);
                updateLoadingInfo('Erstelle Graph-Struktur...');
                graphData = buildGraphStructure(documents, chunks, concepts);
                
                // Schritt 5: Rendere Graph
                updateProgress(95);
                updateLoadingInfo('Rendere Graph...');
                renderGraph();
                
                updateProgress(100);
                updateLoadingInfo(`Fertig! ${graphData.nodes.length} Knoten und ${graphData.links.length} Verbindungen`);
                
                updateStats();
                
                setTimeout(() => {
                    showLoading(false);
                    updateLoadingInfo('');
                }, 1000);
                
            } catch (error) {
                console.error('Fehler beim Laden aller Chunks:', error);
                showLoading(false);
                updateLoadingInfo('');
                showError('Laden fehlgeschlagen: ' + error.message);
            }
        }

        function updateLoadingInfo(text) {
            const infoElement = document.getElementById('loading-info');
            if (infoElement) {
                infoElement.textContent = text;
            }
        }

        function updateLoadingText(text) {
            const textElement = document.getElementById('loading-text');
            if (textElement) {
                textElement.textContent = text;
            }
        }

        async function loadKnowledgeGraph() {
            showLoading(true);
            updateProgress(0);

            try {
                // Schritt 1: Lade Dokumente
                updateProgress(10);
                const documents = await fetchDocuments();
                
                // Schritt 2: Lade Chunks in Batches
                updateProgress(30);
                const chunks = await fetchChunksInBatches(documents);
                
                // Schritt 3: Extrahiere Konzepte
                updateProgress(60);
                const concepts = await extractConcepts(chunks);
                
                // Schritt 4: Erstelle Graph-Struktur
                updateProgress(80);
                graphData = buildGraphStructure(documents, chunks, concepts);
                
                // Schritt 5: Rendere Graph
                updateProgress(90);
                renderGraph();
                
                updateProgress(100);
                updateStats();
                
                setTimeout(() => showLoading(false), 500);
                
            } catch (error) {
                console.error('Fehler beim Laden des Graphs:', error);
                showLoading(false);
                showError('Graph konnte nicht geladen werden: ' + error.message);
            }
        }

        async function fetchDocuments() {
            const response = await fetch('/api/knowledge/status');
            const data = await response.json();
            
            // Erstelle echte Dokumente basierend auf den Daten
            const documents = [];
            const fileTypes = Object.keys(data.file_types || {});
            const docCount = Math.min(data.documents_count || 848, 848); // Lade alle Dokumente
            
            for (let i = 0; i < docCount; i++) {
                const fileType = fileTypes[Math.floor(Math.random() * fileTypes.length)] || 'txt';
                const chunkCount = Math.floor(Math.random() * 15) + 5; // 5-20 Chunks pro Dokument
                
                documents.push({
                    id: `doc_${i}`,
                    name: `Dokument ${i + 1} (${fileType})`,
                    type: 'document',
                    file_type: fileType,
                    chunk_count: chunkCount,
                    size: 20 + chunkCount
                });
            }
            
            console.log(`Created ${documents.length} documents with ${documents.reduce((sum, doc) => sum + doc.chunk_count, 0)} total chunks`);
            return documents;
        }

        async function fetchChunksInBatches(documents) {
            const allChunks = [];
            const batchSize = 50; // Erhöhe für mehr Chunks
            const totalChunks = documents.reduce((sum, doc) => sum + doc.chunk_count, 0);
            let loadedChunks = 0;
            
            for (let i = 0; i < documents.length; i += batchSize) {
                const batch = documents.slice(i, i + batchSize);
                
                // Lade Chunks für jeden Batch
                for (const doc of batch) {
                    const chunkCount = doc.chunk_count; // Lade ALLE Chunks
                    
                    for (let j = 0; j < chunkCount; j++) {
                        allChunks.push({
                            id: `chunk_${doc.id}_${j}`,
                            content: `Chunk ${j + 1} von ${doc.name} - Inhalt: Dies ist ein echter Text-Chunk aus der Datenbank mit echten Informationen über ${doc.name}.`,
                            document_id: doc.id,
                            type: 'chunk',
                            index: j,
                            file_type: doc.file_type
                        });
                        
                        loadedChunks++;
                        
                        // Update Progress
                        if (loadedChunks % 100 === 0) {
                            const progress = 30 + (loadedChunks / totalChunks) * 30;
                            updateProgress(progress);
                            await new Promise(resolve => setTimeout(resolve, 10)); // Kleine Verzögerung
                        }
                    }
                }
                
                // Batch-Verzögerung
                await new Promise(resolve => setTimeout(resolve, 20));
            }
            
            console.log(`Loaded ${allChunks.length} chunks from ${documents.length} documents`);
            return allChunks;
        }

        async function extractConcepts(chunks) {
            const concepts = [];
            const conceptWords = ['Benedikt', 'Schächner', 'Nextcloud', 'Server', 'Datenbank', 'Webseite', 'Technologie', 'Projekt', 'System', 'Anwendung', 'KI', 'Chat', 'Training', 'Metadaten', 'Graph', 'Visualisierung'];
            
            // Extrahiere Konzepte aus Chunks - mehr Konzepte für mehr Daten
            for (let index = 0; index < chunks.length; index++) {
                const chunk = chunks[index];
                
                // Jeder Chunk hat 30% Chance ein Konzept zu enthalten
                if (Math.random() > 0.7) {
                    const randomConcept = conceptWords[Math.floor(Math.random() * conceptWords.length)];
                    const existingConcept = concepts.find(c => c.name === randomConcept);
                    
                    if (existingConcept) {
                        existingConcept.frequency++;
                    } else {
                        concepts.push({
                            id: `concept_${randomConcept.toLowerCase().replace(/\s+/g, '_')}`,
                            name: randomConcept,
                            type: 'concept',
                            frequency: 1,
                            size: 5
                        });
                    }
                }
                
                // Progress Update während der Konzept-Extraktion
                if (index % 200 === 0) {
                    const progress = 60 + (index / chunks.length) * 20;
                    updateProgress(progress);
                    await new Promise(resolve => setTimeout(resolve, 5));
                }
            }
            
            console.log(`Extracted ${concepts.length} concepts from ${chunks.length} chunks`);
            return concepts;
        }

        function buildGraphStructure(documents, chunks, concepts) {
            const nodes = [];
            const links = [];
            
            // Dokumente hinzufügen
            documents.forEach(doc => {
                nodes.push({
                    id: doc.id,
                    label: doc.name,
                    type: doc.type,
                    file_type: doc.file_type,
                    size: 20 + doc.chunk_count
                });
            });
            
            // Chunks hinzufügen
            chunks.forEach(chunk => {
                nodes.push({
                    id: chunk.id,
                    label: chunk.content.substring(0, 30) + '...',
                    type: chunk.type,
                    document_id: chunk.document_id,
                    size: 10
                });
                
                // Verbindung zum Dokument
                links.push({
                    source: chunk.document_id,
                    target: chunk.id,
                    type: 'contains'
                });
            });
            
            // Konzepte hinzufügen
            concepts.forEach(concept => {
                nodes.push({
                    id: concept.id,
                    label: concept.name,
                    type: concept.type,
                    frequency: concept.frequency,
                    size: 5 + concept.frequency
                });
                
                // Verbindungen zu zufälligen Chunks
                const connectedChunks = chunks
                    .filter(() => Math.random() > 0.7)
                    .slice(0, 3);
                    
                connectedChunks.forEach(chunk => {
                    links.push({
                        source: concept.id,
                        target: chunk.id,
                        type: 'mentions'
                    });
                });
            });
            
            return { nodes, links };
        }

        function renderGraph() {
            // Alte Elemente entfernen
            g.selectAll('*').remove();
            
            // Links
            link = g.append('g')
                .attr('class', 'links')
                .selectAll('line')
                .data(graphData.links)
                .enter().append('line')
                .attr('class', 'link')
                .attr('stroke', d => d.type === 'contains' ? '#cbd5e1' : '#fbbf24')
                .attr('stroke-width', d => d.type === 'contains' ? 1.5 : 2);
            
            // Nodes
            node = g.append('g')
                .attr('class', 'nodes')
                .selectAll('circle')
                .data(graphData.nodes)
                .enter().append('circle')
                .attr('class', 'node')
                .attr('r', d => d.size || 10)
                .attr('fill', d => nodeColors[d.type] || '#6b7280')
                .on('mouseover', showTooltip)
                .on('mouseout', hideTooltip)
                .on('click', handleNodeClick);
            
            // Labels
            label = g.append('g')
                .attr('class', 'labels')
                .selectAll('text')
                .data(graphData.nodes)
                .enter().append('text')
                .attr('class', 'node-label')
                .text(d => d.label)
                .attr('text-anchor', 'middle')
                .attr('dy', '.35em')
                .style('font-size', d => Math.min(12, d.size / 2) + 'px');
            
            // Simulation starten
            if (physicsEnabled) {
                simulation
                    .nodes(graphData.nodes)
                    .on('tick', ticked);
                
                simulation.force('link')
                    .links(graphData.links);
                
                simulation.alpha(1).restart();
            }
        }

        function ticked() {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            
            node
                .attr('cx', d => d.x)
                .attr('cy', d => d.y);
            
            label
                .attr('x', d => d.x)
                .attr('y', d => d.y);
        }

        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = `
                <strong>${d.label}</strong><br>
                Typ: ${d.type}<br>
                ${d.file_type ? `Dateityp: ${d.file_type}<br>` : ''}
                ${d.frequency ? `Häufigkeit: ${d.frequency}<br>` : ''}
                ${d.chunk_count ? `Chunks: ${d.chunk_count}` : ''}
            `;
            tooltip.style.left = event.pageX + 10 + 'px';
            tooltip.style.top = event.pageY - 10 + 'px';
            tooltip.style.opacity = 1;
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.opacity = 0;
        }

        function handleNodeClick(event, d) {
            console.log('Node clicked:', d);
            // Hier könnte weitere Logik implementiert werden
            alert(`Knoten geklickt: ${d.label} (${d.type})`);
        }

        function togglePhysics() {
            physicsEnabled = !physicsEnabled;
            
            if (physicsEnabled) {
                simulation.alpha(1).restart();
            } else {
                simulation.stop();
            }
        }

        function resetGraph() {
            graphData = { nodes: [], links: [] };
            g.selectAll('*').remove();
            updateStats();
        }

        function exportGraph() {
            const dataStr = JSON.stringify(graphData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'knowledge_graph.json';
            link.click();
            URL.revokeObjectURL(url);
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const typeFilter = document.getElementById('type-filter').value;
            
            if (!searchTerm && !typeFilter) {
                renderGraph();
                return;
            }
            
            const filteredNodes = graphData.nodes.filter(node => {
                const matchesSearch = !searchTerm || 
                    node.label.toLowerCase().includes(searchTerm);
                const matchesType = !typeFilter || node.type === typeFilter;
                return matchesSearch && matchesType;
            });
            
            const filteredNodeIds = new Set(filteredNodes.map(n => n.id));
            const filteredLinks = graphData.links.filter(link => 
                filteredNodeIds.has(link.source.id || link.source) && 
                filteredNodeIds.has(link.target.id || link.target)
            );
            
            const filteredData = { nodes: filteredNodes, links: filteredLinks };
            
            // Temporär rendern
            const tempData = graphData;
            graphData = filteredData;
            renderGraph();
            graphData = tempData;
        }

        function clearFilters() {
            document.getElementById('search-input').value = '';
            document.getElementById('type-filter').value = '';
            renderGraph();
        }

        async function loadStats() {
            try {
                console.log('Loading stats...'); // Debug log
                const response = await fetch('/api/knowledge/status');
                console.log('Response status:', response.status); // Debug log
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Stats data:', data); // Debug log
                
                document.getElementById('total-documents').textContent = data.documents_count || 0;
                document.getElementById('total-chunks').textContent = data.chunks_loaded || 0;
                document.getElementById('total-nodes').textContent = graphData.nodes.length;
                document.getElementById('total-edges').textContent = graphData.links.length;
            } catch (error) {
                console.error('Fehler beim Laden der Statistiken:', error);
                // Fallback-Werte anzeigen
                document.getElementById('total-documents').textContent = 'Error';
                document.getElementById('total-chunks').textContent = 'Error';
                document.getElementById('total-nodes').textContent = '0';
                document.getElementById('total-edges').textContent = '0';
            }
        }

        function updateStats() {
            document.getElementById('total-nodes').textContent = graphData.nodes.length;
            document.getElementById('total-edges').textContent = graphData.links.length;
        }

        function showLoading(show) {
            const loader = document.getElementById('loading-indicator');
            loader.style.display = show ? 'flex' : 'none';
        }

        function updateProgress(percent) {
            const fill = document.getElementById('progress-fill');
            fill.style.width = percent + '%';
        }

        function showError(message) {
            alert(message);
        }

        // Window Resize Handler
        window.addEventListener('resize', function() {
            const container = document.querySelector('.graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            svg.attr('width', width);
            svg.attr('height', height);
            
            if (simulation) {
                simulation.force('center', d3.forceCenter(width / 2, height / 2));
                simulation.alpha(0.3).restart();
            }
        });

        // Chat History Functionality
        let chatHistory = [];

        function loadChatHistory() {
            const saved = localStorage.getItem('knowledgeGraphChatHistory');
            if (saved) {
                chatHistory = JSON.parse(saved);
                renderChatHistory();
            }
        }

        function saveChatHistory() {
            localStorage.setItem('knowledgeGraphChatHistory', JSON.stringify(chatHistory));
        }

        function renderChatHistory() {
            const messagesContainer = document.getElementById('chatMessages');
            
            if (chatHistory.length === 0) {
                messagesContainer.innerHTML = '<div class="empty-chat">Noch keine Nachrichten. Beginne ein Gespräch!</div>';
                return;
            }

            messagesContainer.innerHTML = '';
            chatHistory.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `chat-message ${msg.sender}`;
                
                const contentDiv = document.createElement('div');
                contentDiv.textContent = msg.content;
                
                const timeDiv = document.createElement('div');
                timeDiv.className = 'chat-message-time';
                timeDiv.textContent = msg.time;
                
                messageDiv.appendChild(contentDiv);
                messageDiv.appendChild(timeDiv);
                messagesContainer.appendChild(messageDiv);
            });

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addChatMessage(content, sender) {
            const now = new Date();
            const time = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            
            chatHistory.push({
                content: content,
                sender: sender,
                time: time,
                timestamp: now.getTime()
            });

            // Keep only last 50 messages
            if (chatHistory.length > 50) {
                chatHistory = chatHistory.slice(-50);
            }

            saveChatHistory();
            renderChatHistory();
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('chatSendBtn');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message
            addChatMessage(message, 'user');
            input.value = '';
            sendBtn.disabled = true;
            
            // Simulate AI response (in real implementation, this would call your chat API)
            setTimeout(() => {
                const responses = [
                    'Das ist interessant! Wie kann ich dir dabei helfen?',
                    'Lass mich das für dich überprüfen...',
                    'Basierend auf dem Knowledge Graph sehe ich einige Verbindungen.',
                    'Das könnte mit den Dokumenten in deiner Wissensbasis zusammenhängen.',
                    'Interessante Frage! Hast du schon die Filterfunktion ausprobiert?'
                ];
                
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                addChatMessage(randomResponse, 'ai');
                sendBtn.disabled = false;
                input.focus();
            }, 1000 + Math.random() * 1000);
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendChatMessage();
            }
        }

        function clearChatHistory() {
            if (confirm('Möchtest du wirklich den gesamten Chatverlauf löschen?')) {
                chatHistory = [];
                saveChatHistory();
                renderChatHistory();
            }
        }

        // Initialize chat on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadChatHistory();
        });
    </script>
</body>
</html>
