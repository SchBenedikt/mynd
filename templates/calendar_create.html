<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender-Ereignis erstellen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">
                <i class="fas fa-calendar-plus mr-2"></i>
                Kalender-Ereignis erstellen
            </h1>

            <!-- Schnellerstellung -->
            <div class="mb-8">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">Schnellerstellung</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Ereignis beschreiben
                        </label>
                        <textarea 
                            id="quickMessage" 
                            class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            rows="3"
                            placeholder="z.B. &quot;Erstelle einen Termin &quot;Team Meeting&quot; morgen um 14:30 im Konferenzraum&quot;"
                        ></textarea>
                    </div>
                    <button 
                        onclick="quickCreate()"
                        class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200"
                    >
                        <i class="fas fa-magic mr-2"></i>
                        Intelligent erstellen
                    </button>
                </div>
            </div>

            <!-- Detaillierte Erstellung -->
            <div class="border-t pt-6">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">Detaillierte Erstellung</h2>
                <form id="eventForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Titel <span class="text-red-500">*</span>
                        </label>
                        <input 
                            type="text" 
                            id="title" 
                            required
                            class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            placeholder="Titel des Ereignisses"
                        >
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Startzeit <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="datetime-local" 
                                id="startTime" 
                                required
                                class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            >
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Endzeit
                            </label>
                            <input 
                                type="datetime-local" 
                                id="endTime"
                                class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            >
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Kalender
                        </label>
                        <select 
                            id="calendarName"
                            class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        >
                            <option value="">Kalender auswählen...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Ort
                        </label>
                        <input 
                            type="text" 
                            id="location"
                            class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            placeholder="Ort des Ereignisses"
                        >
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Beschreibung
                        </label>
                        <textarea 
                            id="description"
                            rows="3"
                            class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            placeholder="Beschreibung des Ereignisses"
                        ></textarea>
                    </div>

                    <button 
                        type="submit"
                        class="w-full bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 transition duration-200"
                    >
                        <i class="fas fa-save mr-2"></i>
                        Ereignis erstellen
                    </button>
                </form>
            </div>

            <!-- Status-Meldungen -->
            <div id="statusMessage" class="hidden mt-4 p-4 rounded-md"></div>
        </div>
    </div>

    <script>
        // Kalender laden
        async function loadCalendars() {
            try {
                const response = await fetch('/api/calendar/calendars');
                const data = await response.json();
                
                const select = document.getElementById('calendarName');
                select.innerHTML = '<option value="">Kalender auswählen...</option>';
                
                if (data.calendars) {
                    data.calendars.forEach(calendar => {
                        const option = document.createElement('option');
                        option.value = calendar.name;
                        option.textContent = calendar.name;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Fehler beim Laden der Kalender:', error);
            }
        }

        // Schnellerstellung
        async function quickCreate() {
            const message = document.getElementById('quickMessage').value;
            if (!message.trim()) {
                showStatus('Bitte eine Beschreibung eingeben', 'error');
                return;
            }

            showStatus('Verarbeite Anfrage...', 'info');

            try {
                const response = await fetch('/api/calendar/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();

                if (data.requires_input) {
                    // Zeige interaktives UI für fehlende Informationen
                    showInteractiveForm(data);
                } else if (data.success) {
                    showStatus(data.message, 'success');
                    document.getElementById('quickMessage').value = '';
                } else {
                    showStatus(data.error || 'Fehler beim Erstellen', 'error');
                }
            } catch (error) {
                showStatus('Fehler bei der Verarbeitung: ' + error.message, 'error');
            }
        }

        // Interaktives Formular für fehlende Informationen
        function showInteractiveForm(data) {
            const extracted = data.extracted_info;
            const missing = data.missing_info;
            
            // Fülle bekannte Informationen ein
            if (extracted.title) document.getElementById('title').value = extracted.title;
            if (extracted.start_time) {
                // Konvertiere Zeitformat
                const date = new Date();
                const [hours, minutes] = extracted.start_time.split(':');
                date.setHours(hours, minutes);
                document.getElementById('startTime').value = date.toISOString().slice(0, 16);
            }
            if (extracted.location) document.getElementById('location').value = extracted.location;
            
            // Fülle Kalender-Optionen
            const select = document.getElementById('calendarName');
            select.innerHTML = '<option value="">Kalender auswählen...</option>';
            
            if (data.available_calendars) {
                data.available_calendars.forEach(calendar => {
                    const option = document.createElement('option');
                    option.value = calendar.name;
                    option.textContent = calendar.name;
                    if (extracted.calendar_name && calendar.name.toLowerCase().includes(extracted.calendar_name.toLowerCase())) {
                        option.selected = true;
                    }
                    select.appendChild(option);
                });
            }
            
            // Zeige welche Informationen fehlen
            let message = 'Bitte folgende Informationen ergänzen: ' + missing.join(', ');
            showStatus(message, 'warning');
            
            // Scrolle zum Formular
            document.getElementById('eventForm').scrollIntoView({ behavior: 'smooth' });
        }

        // Detaillierte Erstellung
        document.getElementById('eventForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                title: document.getElementById('title').value,
                start_time: document.getElementById('startTime').value,
                end_time: document.getElementById('endTime').value,
                calendar_name: document.getElementById('calendarName').value,
                location: document.getElementById('location').value,
                description: document.getElementById('description').value
            };

            showStatus('Erstelle Ereignis...', 'info');

            try {
                const response = await fetch('/api/calendar/create-with-details', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    showStatus(data.message, 'success');
                    // Formular zurücksetzen
                    document.getElementById('eventForm').reset();
                } else {
                    showStatus(data.error || 'Fehler beim Erstellen', 'error');
                }
            } catch (error) {
                showStatus('Fehler bei der Verarbeitung: ' + error.message, 'error');
            }
        });

        // Status-Meldungen anzeigen
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.classList.remove('hidden');
            
            // Klassen basierend auf Typ setzen
            statusDiv.className = 'mt-4 p-4 rounded-md';
            
            switch(type) {
                case 'success':
                    statusDiv.classList.add('bg-green-100', 'text-green-800', 'border', 'border-green-200');
                    break;
                case 'error':
                    statusDiv.classList.add('bg-red-100', 'text-red-800', 'border', 'border-red-200');
                    break;
                case 'warning':
                    statusDiv.classList.add('bg-yellow-100', 'text-yellow-800', 'border', 'border-yellow-200');
                    break;
                case 'info':
                    statusDiv.classList.add('bg-blue-100', 'text-blue-800', 'border', 'border-blue-200');
                    break;
            }
        }

        // Initialisierung
        document.addEventListener('DOMContentLoaded', function() {
            loadCalendars();
            
            // Setze Standardzeit auf aktuelle Zeit
            const now = new Date();
            const localDateTime = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
            document.getElementById('startTime').value = localDateTime;
            
            // Setze Endzeit auf +1 Stunde
            const endTime = new Date(now.getTime() - now.getTimezoneOffset() * 60000 + 3600000).toISOString().slice(0, 16);
            document.getElementById('endTime').value = endTime;
        });
    </script>
</body>
</html>
