<!DOCTYPE html>
<html lang="de" data-theme="classic">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextMind - Second Brain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM_Plex_Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-1: #f6f2e8;
            --bg-2: #f0e6d6;
            --ink: #17140f;
            --muted: #5b5347;
            --line: rgba(23, 20, 15, 0.14);
            --brand: #0f7c5f;
            --brand-2: #d76b2d;
            --chip-bg: #fff8ec;
            --chip-hover: #fff1dc;
            --input-bg: rgba(255, 252, 247, 0.78);
            --bubble-user: #e9fff6;
            --bubble-assistant: #ffffff;
            --font-space-grotesk: 'Space Grotesk', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        body[data-theme="ocean"] {
            --bg-1: #eef4ff;
            --bg-2: #dce8ff;
            --ink: #121826;
            --muted: #566074;
            --line: rgba(18, 24, 38, 0.14);
            --brand: #2f63ff;
            --brand-2: #15b79e;
            --chip-bg: #f4f8ff;
            --chip-hover: #eaf2ff;
            --input-bg: rgba(255, 255, 255, 0.82);
            --bubble-user: #eaf2ff;
            --bubble-assistant: #ffffff;
        }

        body[data-theme="graphite"] {
            --bg-1: #f3f3f3;
            --bg-2: #e7e7e7;
            --ink: #181818;
            --muted: #555555;
            --line: rgba(24, 24, 24, 0.15);
            --brand: #424242;
            --brand-2: #8a6f50;
            --chip-bg: #f8f8f8;
            --chip-hover: #efefef;
            --input-bg: rgba(248, 248, 248, 0.78);
            --bubble-user: #e8e8e8;
            --bubble-assistant: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            color: var(--ink);
            font-family: var(--font-space-grotesk), sans-serif;
            background: radial-gradient(1200px 520px at -10% -20%, #fff8d9 0%, transparent 60%),
                        radial-gradient(900px 420px at 110% 10%, #ffd7be 0%, transparent 55%),
                        linear-gradient(145deg, var(--bg-1), var(--bg-2));
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* === TOPBAR === */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.7rem;
            padding: 0.6rem 0.95rem;
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(8px);
            background: rgba(255, 252, 247, 0.48);
            z-index: 30;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .icon-btn {
            border: 1px solid var(--line);
            background: var(--chip-bg);
            color: var(--ink);
            border-radius: 999px;
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--chip-hover);
            border-color: var(--brand);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            font-size: 1rem;
            font-weight: 500;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.6rem;
            background: var(--chip-bg);
            border: 1px solid var(--line);
            border-radius: 999px;
            font-size: 0.75rem;
            color: var(--muted);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #888;
        }

        .status-dot.ok {
            background: var(--brand);
        }

        .status-dot.error {
            background: #ef4444;
        }

        /* === MAIN CONTENT === */
        .main {
            flex: 1;
            display: flex;
            margin-top: 58px;
            overflow: hidden;
        }

        /* === SIDEBAR === */
        .sidebar {
            width: 0;
            background: var(--bg-2);
            border-right: 1px solid var(--line);
            overflow: hidden;
            transition: width 0.3s ease;
            z-index: 20;
        }

        .sidebar.open {
            width: 360px;
        }

        .sidebar-content {
            width: 360px;
            height: 100%;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar-content::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: var(--line);
            border-radius: 3px;
        }

        .sidebar-content::-webkit-scrollbar-thumb:hover {
            background: var(--muted);
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--muted);
        }

        .input-group input, .input-group select {
            padding: 0.5rem 0.75rem;
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--ink);
            font-family: var(--font-space-grotesk);
            font-size: 0.9rem;
            transition: border 0.2s;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--brand);
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 80px;
            padding: 0.5rem 1rem;
            background: var(--chip-bg);
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--ink);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--chip-hover);
            border-color: var(--brand);
        }

        .btn.primary {
            background: var(--brand);
            color: white;
            border-color: var(--brand);
        }

        .btn.primary:hover {
            opacity: 0.9;
        }

        .status-text {
            font-size: 0.8rem;
            color: var(--muted);
            padding: 0.5rem;
            background: var(--chip-bg);
            border-radius: 4px;
            border-left: 3px solid var(--brand);
        }

        .status-text.error {
            border-left-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        /* === TABS === */
        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid var(--line);
            padding-bottom: 0.8rem;
            margin-bottom: 1rem;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--ink);
        }

        .tab-btn.active {
            color: var(--brand);
            border-bottom-color: var(--brand);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* === CHAT AREA === */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* === LANDING VIEW === */
        .landing {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 2rem;
            text-align: center;
        }

        .landing-header {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 500px;
        }

        .landing-header h2 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
            color: var(--ink);
        }

        .landing-header p {
            font-size: 1.1rem;
            color: var(--muted);
            margin: 0;
        }

        .input-wrapper {
            width: 100%;
            max-width: 500px;
            display: flex;
            gap: 0.5rem;
        }

        .input-wrapper input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--ink);
            font-family: var(--font-space-grotesk);
            font-size: 1rem;
            transition: border 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--brand);
        }

        .input-wrapper button {
            width: 44px;
            height: 44px;
            border-radius: 999px;
            background: var(--brand);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .input-wrapper button:hover {
            opacity: 0.9;
        }

        /* === CONVERSATION VIEW === */
        .conversation {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .messages {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--line);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.user .bubble {
            background: var(--bubble-user);
            color: var(--ink);
            border-radius: 18px 18px 4px 18px;
        }

        .message.assistant .bubble {
            background: var(--bubble-assistant);
            color: var(--ink);
            border: 1px solid var(--line);
            border-radius: 18px 18px 18px 4px;
        }

        .bubble {
            max-width: 70%;
            padding: 0.75rem 1rem;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .thinking-indicator {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            padding: 0.75rem 1rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === COMPOSER === */
        .composer {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid var(--line);
            background: var(--bg-1);
        }

        .composer input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--ink);
            font-family: var(--font-space-grotesk);
            font-size: 0.95rem;
            transition: border 0.2s;
        }

        .composer input:focus {
            outline: none;
            border-color: var(--brand);
        }

        .composer button {
            width: 44px;
            height: 44px;
            border-radius: 999px;
            background: var(--brand);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .composer button:hover {
            opacity: 0.9;
        }

        .composer button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* === THEME SELECTOR === */
        .theme-selector {
            display: flex;
            gap: 0.5rem;
        }

        .theme-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-btn.classic {
            background: #d4a574;
        }

        .theme-btn.ocean {
            background: #4fa3ff;
        }

        .theme-btn.graphite {
            background: #808080;
        }

        .theme-btn.active {
            border-color: var(--ink);
            transform: scale(1.1);
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .landing-header h2 {
                font-size: 1.8rem;
            }

            .bubble {
                max-width: 85%;
            }

            .sidebar.open {
                width: 100%;
                position: fixed;
                height: 100%;
                top: 58px;
                left: 0;
            }

            .main {
                position: relative;
            }
        }
    </style>
</head>
<body>
    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-left">
            <button class="icon-btn" id="sidebarToggle" title="Menü">
                <i class="fas fa-bars"></i>
            </button>
            <div class="brand">
                <div class="brand-icon">🧠</div>
                <div>NextMind</div>
            </div>
        </div>
        <div class="topbar-right">
            <div class="status-badge">
                <span class="status-dot ok" id="statusDot"></span>
                <span id="statusText">Checking...</span>
            </div>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="main">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <!-- TAB NAVIGATION -->
                <div class="tabs">
                    <button class="tab-btn active" onclick="showSettingTab('ai', event)">🤖 AI</button>
                    <button class="tab-btn" onclick="showSettingTab('nextcloud', event)">☁️ Nextcloud</button>
                    <button class="tab-btn" onclick="showSettingTab('indexing', event)">📊 Indexing</button>
                    <button class="tab-btn" onclick="showSettingTab('graph', event)">🔗 Graph</button>
                    <button class="tab-btn" onclick="showSettingTab('sources', event)">📂 Sources</button>
                </div>

                <!-- AI TAB -->
                <div class="tab-content active" id="tab-ai">
                    <div class="sidebar-section">
                        <div class="section-title">🤖 AI Configuration</div>
                        
                        <div class="input-group">
                            <label>Protocol</label>
                            <select id="aiProtocol" onchange="updateAIPreview()">
                                <option value="http">http</option>
                                <option value="https">https</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Host</label>
                            <input type="text" id="aiHost" placeholder="127.0.0.1" oninput="updateAIPreview()">
                        </div>

                        <div class="input-group">
                            <label>Port</label>
                            <input type="number" id="aiPort" min="1" max="65535" value="11434" oninput="updateAIPreview()">
                        </div>

                        <div class="input-group">
                            <label>Base URL</label>
                            <input type="text" id="aiBaseUrl" readonly style="background: var(--chip-bg);">
                        </div>

                        <div class="input-group">
                            <label>Model</label>
                            <select id="aiModel">
                                <option value="">Loading...</option>
                            </select>
                        </div>

                        <div id="aiStatus" class="status-text"></div>

                        <div class="button-group">
                            <button class="btn" onclick="saveAIConfig()">Save</button>
                            <button class="btn" onclick="loadOllamaModels()">Reload</button>
                        </div>

                        <div class="input-group">
                            <label>Test Prompt</label>
                            <input type="text" id="aiTestPrompt" placeholder="Test your AI...">
                        </div>
                        <button class="btn primary" onclick="testAIConfig()" style="width: 100%;">Test AI</button>
                    </div>
                </div>

                <!-- NEXTCLOUD TAB -->
                <div class="tab-content" id="tab-nextcloud">
                    <div class="sidebar-section">
                        <div class="section-title">☁️ Nextcloud</div>
                        
                        <div class="input-group">
                            <label>URL</label>
                            <input type="url" id="nextcloudUrl" placeholder="https://your-nextcloud.com">
                        </div>

                        <div class="input-group">
                            <label>Username</label>
                            <input type="text" id="nextcloudUsername" placeholder="username">
                        </div>

                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="nextcloudPassword" placeholder="password">
                        </div>

                        <div class="input-group">
                            <label>Directory</label>
                            <input type="text" id="nextcloudPath" placeholder="/" value="/">
                        </div>

                        <div class="button-group">
                            <button class="btn" onclick="saveNextcloudConfig()">Save</button>
                            <button class="btn" onclick="startIndexing()">Index Now</button>
                        </div>

                        <div id="nextcloudStatus" class="status-text" style="margin-top: 1rem;"></div>
                    </div>
                </div>

                <!-- INDEXING TAB -->
                <div class="tab-content" id="tab-indexing">
                    <div class="sidebar-section">
                        <div class="section-title">📊 Indexing Status</div>
                        
                        <div class="input-group">
                            <label>Progress</label>
                            <div style="background: var(--chip-bg); border-radius: 4px; overflow: hidden; height: 8px;">
                                <div id="progressBar" style="width: 0%; height: 100%; background: var(--brand); transition: width 0.3s;"></div>
                            </div>
                            <small id="progressPercent">0%</small>
                        </div>

                        <div class="input-group" style="gap: 0.3rem;">
                            <label style="font-weight: 600;">Status</label>
                            <p id="indexingStatus" style="margin: 0; font-size: 0.9rem; color: var(--muted);">Idle</p>
                            <p id="indexingStats" style="margin: 0.3rem 0 0 0; font-size: 0.8rem; color: var(--muted);">-</p>
                        </div>

                        <div class="button-group">
                            <button class="btn" onclick="startIndexing()">Start</button>
                            <button class="btn" onclick="stopIndexing()">Stop</button>
                        </div>

                        <div id="indexingInfo" class="status-text" style="margin-top: 1rem;"></div>
                    </div>
                </div>

                <!-- GRAPH TAB -->
                <div class="tab-content" id="tab-graph">
                    <div class="sidebar-section">
                        <div class="section-title">🔗 Knowledge Graph</div>
                        
                        <p style="font-size: 0.9rem; color: var(--muted); margin: 0.5rem 0;">
                            Interactive visualization of your knowledge base
                        </p>

                        <div class="button-group">
                            <button class="btn primary" onclick="openKnowledgeGraph()" style="width: 100%;">Open Graph</button>
                        </div>

                        <div id="graphStatus" class="status-text" style="margin-top: 1rem;"></div>
                    </div>
                </div>

                <!-- SOURCES & THEME TAB -->
                <div class="tab-content" id="tab-sources">
                    <div class="sidebar-section">
                        <div class="section-title">📂 Message Sources</div>
                        <div class="input-group" style="gap: 0.5rem;">
                            <label style="margin-bottom: 0.3rem;">
                                <input type="radio" name="source" value="auto" checked> Auto
                            </label>
                            <label>
                                <input type="radio" name="source" value="files"> Files
                            </label>
                            <label>
                                <input type="radio" name="source" value="photos"> Photos
                            </label>
                        </div>
                    </div>

                    <div class="sidebar-section">
                        <div class="section-title">🎨 Theme</div>
                        <div class="theme-selector">
                            <button class="theme-btn classic active" onclick="setTheme('classic')"></button>
                            <button class="theme-btn ocean" onclick="setTheme('ocean')"></button>
                            <button class="theme-btn graphite" onclick="setTheme('graphite')"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-area">
            <!-- LANDING VIEW -->
            <div class="landing" id="landing">
                <div class="landing-header">
                    <h2>What's on your mind?</h2>
                    <p>Ask anything about your knowledge base or get creative answers powered by AI.</p>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="landingInput" placeholder="Ask a question..." onkeypress="if(event.key==='Enter') sendMessage(this.value, 'landing')">
                    <button onclick="sendMessage(document.getElementById('landingInput').value, 'landing')">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- CONVERSATION VIEW (hidden initially) -->
            <div class="conversation" id="conversation" style="display: none;">
                <div class="messages" id="messages"></div>
            </div>

            <!-- COMPOSER (hidden initially) -->
            <div class="composer" id="composer" style="display: none;">
                <input type="text" id="composerInput" placeholder="Your message here..." onkeypress="if(event.key==='Enter' && !event.ctrlKey) sendMessage(this.value, 'composer')">
                <button onclick="sendMessage(document.getElementById('composerInput').value, 'composer')">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // === STATE ===
        let currentTheme = localStorage.getItem('theme') || 'classic';
        let isThinking = false;
        let messages = [];
        let progressInterval = null;

        // === INITIALIZATION ===
        document.addEventListener('DOMContentLoaded', () => {
            setTheme(currentTheme);
            loadAIConfig();
            loadOllamaModels();
            updateStatus();
            setInterval(updateStatus, 8000);
        });

        // === SIDEBAR TOGGLE ===
        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // === TABS ===
        function showSettingTab(tabName, event) {
            event.preventDefault();
            
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Deactivate all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            const tab = document.getElementById(`tab-${tabName}`);
            if (tab) {
                tab.classList.add('active');
            }
            
            // Activate button
            event.target.classList.add('active');
            
            // Start progress updates if indexing tab
            if (tabName === 'indexing') {
                updateProgress();
            }
        }

        // === THEME ===
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            currentTheme = theme;
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.theme-btn.${theme}`).classList.add('active');
        }

        // === AI CONFIG ===
        function updateAIPreview() {
            const protocol = document.getElementById('aiProtocol').value;
            const host = document.getElementById('aiHost').value || '127.0.0.1';
            const port = document.getElementById('aiPort').value;
            const baseUrl = `${protocol}://${host}:${port}`;
            document.getElementById('aiBaseUrl').value = baseUrl;
        }

        async function loadAIConfig() {
            try {
                const res = await fetch('/api/ai/config');
                const config = await res.json();
                const url = new URL(config.base_url);
                document.getElementById('aiProtocol').value = url.protocol.replace(':', '');
                document.getElementById('aiHost').value = url.hostname;
                document.getElementById('aiPort').value = url.port || 11434;
                document.getElementById('aiModel').value = config.model;
                updateAIPreview();
                document.getElementById('aiStatus').innerHTML = '✓ Config loaded';
            } catch (err) {
                console.error('Error loading config:', err);
            }
        }

        async function saveAIConfig() {
            try {
                const baseUrl = document.getElementById('aiBaseUrl').value;
                const model = document.getElementById('aiModel').value;
                const res = await fetch('/api/ai/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ base_url: baseUrl, model })
                });
                const result = await res.json();
                document.getElementById('aiStatus').innerHTML = '✓ Saved successfully';
                document.getElementById('aiStatus').style.color = 'var(--brand)';
                updateStatus();
            } catch (err) {
                document.getElementById('aiStatus').innerHTML = '✗ Error saving';
                document.getElementById('aiStatus').classList.add('error');
            }
        }

        async function loadOllamaModels() {
            try {
                const res = await fetch('/api/ollama/models');
                const data = await res.json();
                const select = document.getElementById('aiModel');
                select.innerHTML = '';
                data.models.forEach(model => {
                    const opt = document.createElement('option');
                    opt.value = model;
                    opt.textContent = model;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error('Error loading models:', err);
            }
        }

        async function testAIConfig() {
            try {
                const prompt = document.getElementById('aiTestPrompt').value || 'Respond with: OK';
                const res = await fetch('/api/ai/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const result = await res.json();
                const duration = result.duration_ms || 0;
                const statusEl = document.getElementById('aiStatus');
                statusEl.innerHTML = `✓ Success (${duration}ms): ${result.response.substring(0, 100)}...`;
                statusEl.style.color = 'var(--brand)';
                statusEl.classList.remove('error');
            } catch (err) {
                document.getElementById('aiStatus').innerHTML = '✗ Test failed: ' + err.message;
                document.getElementById('aiStatus').classList.add('error');
            }
        }

        // === NEXTCLOUD CONFIG ===
        async function saveNextcloudConfig() {
            try {
                const url = document.getElementById('nextcloudUrl').value;
                const username = document.getElementById('nextcloudUsername').value;
                const password = document.getElementById('nextcloudPassword').value;
                const path = document.getElementById('nextcloudPath').value;
                
                const res = await fetch('/api/indexing/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, username, password, path })
                });
                
                const result = await res.json();
                if (res.ok) {
                    document.getElementById('nextcloudStatus').innerHTML = '✓ Config saved';
                    document.getElementById('nextcloudStatus').style.color = 'var(--brand)';
                } else {
                    document.getElementById('nextcloudStatus').innerHTML = `✗ ${result.error}`;
                    document.getElementById('nextcloudStatus').classList.add('error');
                }
            } catch (err) {
                document.getElementById('nextcloudStatus').innerHTML = '✗ Error: ' + err.message;
                document.getElementById('nextcloudStatus').classList.add('error');
            }
        }

        // === INDEXING ===
        async function startIndexing() {
            try {
                const res = await fetch('/api/indexing/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                
                if (res.ok) {
                    document.getElementById('indexingInfo').innerHTML = '✓ Indexing started';
                    startProgressUpdates();
                } else {
                    const data = await res.json();
                    document.getElementById('indexingInfo').innerHTML = `✗ ${data.error}`;
                    document.getElementById('indexingInfo').classList.add('error');
                }
            } catch (err) {
                document.getElementById('indexingInfo').innerHTML = '✗ Error: ' + err.message;
                document.getElementById('indexingInfo').classList.add('error');
            }
        }

        async function stopIndexing() {
            try {
                const res = await fetch('/api/indexing/stop', { method: 'POST' });
                if (res.ok) {
                    document.getElementById('indexingInfo').innerHTML = '✓ Indexing stopped';
                    if (progressInterval) clearInterval(progressInterval);
                }
            } catch (err) {
                document.getElementById('indexingInfo').innerHTML = '✗ Error: ' + err.message;
                document.getElementById('indexingInfo').classList.add('error');
            }
        }

        function startProgressUpdates() {
            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(updateProgress, 500);
        }

        async function updateProgress() {
            try {
                const res = await fetch('/api/indexing/progress');
                if (res.ok) {
                    const data = await res.json();
                    const pct = Math.round(data.progress_percentage);
                    document.getElementById('progressBar').style.width = pct + '%';
                    document.getElementById('progressPercent').innerText = pct + '%';
                    document.getElementById('indexingStatus').innerText = data.status || 'processing';
                    document.getElementById('indexingStats').innerText = 
                        `${data.processed_files}/${data.total_files} files | ${Math.round(data.elapsed_time)}s`;
                    
                    if (data.status === 'completed' || data.status === 'error') {
                        if (progressInterval) clearInterval(progressInterval);
                    }
                }
            } catch (err) {
                console.error('Update progress error:', err);
            }
        }

        // === KNOWLEDGE GRAPH ===
        function openKnowledgeGraph() {
            window.open('/knowledge-graph', '_blank');
        }

        // === STATUS ===
        async function updateStatus() {
            try {
                const [ollamaRes, kbRes] = await Promise.all([
                    fetch('/api/ollama/status'),
                    fetch('/api/knowledge/status')
                ]);
                const ollama = await ollamaRes.json();
                const kb = await kbRes.json();
                
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                
                if (ollama.connected && kb.chunks_loaded > 0) {
                    dot.className = 'status-dot ok';
                    text.textContent = `${kb.chunks_loaded} Chunks | ${ollama.model}`;
                } else {
                    dot.className = 'status-dot error';
                    text.textContent = 'Offline';
                }
            } catch (err) {
                document.getElementById('statusDot').className = 'status-dot error';
                document.getElementById('statusText').textContent = 'Error';
            }
        }

        // === CHAT ===
        function switchToChat() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('conversation').style.display = 'flex';
            document.getElementById('composer').style.display = 'flex';
        }

        function addMessage(role, content) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            messageEl.appendChild(bubble);
            document.getElementById('messages').appendChild(messageEl);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function addThinking() {
            const messageEl = document.createElement('div');
            messageEl.className = 'message assistant';
            messageEl.id = 'thinking';
            const thinking = document.createElement('div');
            thinking.className = 'thinking-indicator';
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                thinking.appendChild(dot);
            }
            messageEl.appendChild(thinking);
            document.getElementById('messages').appendChild(messageEl);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function removeThinking() {
            const el = document.getElementById('thinking');
            if (el) el.remove();
        }

        async function sendMessage(text, source) {
            text = text.trim();
            if (!text || isThinking) return;

            if (source === 'landing') {
                document.getElementById('landingInput').value = '';
                switchToChat();
            } else if (source === 'composer') {
                document.getElementById('composerInput').value = '';
            }

            addMessage('user', text);
            isThinking = true;
            addThinking();

            try {
                const sourceFilter = document.querySelector('input[name="source"]:checked')?.value || 'auto';
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, source: sourceFilter })
                });
                const data = await res.json();
                removeThinking();
                addMessage('assistant', data.response);
            } catch (err) {
                removeThinking();
                addMessage('assistant', `Error: ${err.message}`);
            } finally {
                isThinking = false;
            }
        }
    </script>
</body>
</html>
