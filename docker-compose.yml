services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-me-in-production}
      JWT_SECRET: ${JWT_SECRET:-}
      KNOWLEDGE_DB_PATH: /app/data/knowledge_base.db
      NEXTCLOUD_ACCOUNTS_KEY: ${NEXTCLOUD_ACCOUNTS_KEY:-}
      AUTH_COOKIE_SECURE: "true"
      MYND_DEBUG: "0"
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - mynd-data:/app/data
      - mynd-backend-config:/app/backend/config
    ports:
      - "5001:5001"
    depends_on:
      - ollama

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://backend:5001
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://backend:5001
      MYND_BACKEND_TTS_URL: http://backend:5001/api/tts/synthesize
    volumes:
      - mynd-data:/app/data
      - mynd-backend-config:/app/backend/config
    ports:
      - "3000:3000"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  mynd-data:
  mynd-backend-config:
  ollama-data: